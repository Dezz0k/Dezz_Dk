  <!-- GitHub Pages project sites live under /RepoName/ — without this, assets 404 and the video/sound break -->
  <script>
    (function () {
      var base = "/";
      if (location.hostname.indexOf("github.io") !== -1) {
        var parts = location.pathname.split("/").filter(Boolean);
        if (parts.length) {
          base = "/" + parts[0] + "/";
        }
      }
      document.write('<base href="' + base + '">');
    })();
  </script>

      var p = location.pathname;
      if (p.length > 1 && p.indexOf("/", p.length - 1) === -1 && p.split("/").filter(Boolean).length === 1) {
        location.replace(p + "/" + location.search + location.hash);
      }
    })();
